name: pbti
description: "PBTI (Politics Type Indicator) - 정치 성향 테스트 웹서비스"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Backend / DB ---
  supabase_flutter: ^2.5.6

  # --- State Management ---
  provider: ^6.1.2

  # --- Routing ---
  go_router: ^14.2.0

  # --- Data Visualization ---
  fl_chart: ^0.68.0

  # --- Share / Capture ---
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # --- Utils ---
  uuid: ^4.4.0                 # 익명 session_id 생성
  shared_preferences: ^2.2.3   # session_id 로컬(웹 localStorage) 영속화
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1         # MBTI류 UI 특유의 타이포그래피

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/politicians/
    - assets/images/types/
